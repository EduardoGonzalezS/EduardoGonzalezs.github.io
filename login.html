<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmaAdmin — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --font: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: var(--font);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d2d5e 0%, #1a4a8a 45%, #2563eb 100%);
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: rgba(255,255,255,.03);
      border-radius: 50%;
      top: -200px; right: -200px;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: rgba(255,255,255,.04);
      border-radius: 50%;
      bottom: -150px; left: -100px;
    }

    /* Floating pills decoration */
    .deco-pill {
      position: fixed;
      background: rgba(255,255,255,.06);
      border-radius: 50px;
      animation: floatPill 8s ease-in-out infinite;
    }
    .deco-pill:nth-child(1) { width: 80px; height: 30px; top: 15%; left: 8%; animation-delay: 0s; }
    .deco-pill:nth-child(2) { width: 50px; height: 20px; top: 60%; right: 10%; animation-delay: 2s; }
    .deco-pill:nth-child(3) { width: 100px; height: 35px; bottom: 20%; left: 15%; animation-delay: 4s; }
    .deco-pill:nth-child(4) { width: 60px; height: 22px; top: 30%; right: 20%; animation-delay: 1s; }

    @keyframes floatPill {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: .6; }
      50% { transform: translateY(-15px) rotate(5deg); opacity: 1; }
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 40px 36px;
      box-shadow: 0 25px 60px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.1);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(37,99,235,.35);
    }
    .brand-logo i {
      font-size: 26px;
      color: #fff;
    }
    .brand-title {
      font-size: 24px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 13px;
      color: #64748b;
    }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 14px;
    }
    .input-wrapper .form-control {
      padding-left: 38px;
      padding-right: 12px;
      height: 44px;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      font-size: 14px;
      font-family: var(--font);
      color: #1e293b;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    .input-wrapper .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .input-wrapper .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
    }
    .input-wrapper .toggle-pass:hover { color: #475569; }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .form-check-label {
      font-size: 13px;
      color: #374151;
    }
    .forgot-link {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(37,99,235,.4);
    }
    .btn-login:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
    .divider-text { font-size: 12px; color: #94a3b8; font-weight: 500; }

    .branch-hint {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 14px;
    }
    .branch-hint strong { color: #64748b; }

    /* Sucursales pills at bottom */
    .sucursales-info {
      text-align: center;
      margin-top: 24px;
    }
    .sucursales-info p {
      font-size: 12px;
      color: rgba(255,255,255,.55);
      margin-bottom: 10px;
    }
    .sucursal-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .sucursal-pill {
      padding: 4px 12px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 20px;
      font-size: 11px;
      color: rgba(255,255,255,.7);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 28px 24px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- Decorative floating pills -->
  <div class="deco-pill"></div>
  <div class="deco-pill"></div>
  <div class="deco-pill"></div>
  <div class="deco-pill"></div>

  <div class="login-wrapper">
    <!-- Login Card -->
    <div class="login-card">
      <div class="brand-header">
        <div class="brand-logo">
          <i class="fa-solid fa-pills"></i>
        </div>
        <div class="brand-title">FarmaAdmin</div>
        <div class="brand-sub">Sistema de Administración de Farmacias</div>
      </div>

      <form action="dashboard.html">
        <div class="form-group">
          <label class="form-label" for="usuario">Usuario</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input type="text" class="form-control" id="usuario"
                   placeholder="Tu nombre de usuario" value="admin">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password"
                   placeholder="••••••••" value="••••••••">
            <button type="button" class="toggle-pass" onclick="togglePassword()">
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" checked>
            <label class="form-check-label" for="remember">Recordar sesión</label>
          </div>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login">
          <i class="fa-solid fa-right-to-bracket"></i>
          Iniciar Sesión
        </button>
      </form>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">ACCESO SEGURO</span>
        <div class="divider-line"></div>
      </div>

      <div class="branch-hint">
        <strong>8 Sucursales</strong> activas en el sistema &nbsp;·&nbsp;
        <i class="fa-solid fa-shield-halved text-success"></i>
        Conexión cifrada
      </div>
    </div>

    <!-- Sucursales info below card -->
    <div class="sucursales-info">
      <p>Red de farmacias activas</p>
      <div class="sucursal-pills">
        <span class="sucursal-pill">Sucursal Central</span>
        <span class="sucursal-pill">Norte</span>
        <span class="sucursal-pill">Sur</span>
        <span class="sucursal-pill">Este</span>
        <span class="sucursal-pill">Oeste</span>
        <span class="sucursal-pill">Plaza Mayor</span>
        <span class="sucursal-pill">Universitaria</span>
        <span class="sucursal-pill">Industrial</span>
      </div>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye';
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
